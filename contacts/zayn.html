<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Zayn Mohammad - Sales Team Head at Black Arrow Venture. Contact information and digital business card.">
  <link rel="apple-touch-icon" href="../assets/images/black-arrow-logo.png">
  <meta property="og:title" content="Zayn Mohammad - Black Arrow Venture">
  <meta property="og:description" content="Sales Team Head | Contact Zayn Mohammad">
  <meta property="og:type" content="website">
  <title>Zayn Mohammad - Black Arrow Venture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    .business-card {
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      padding: 60px 50px;
      margin-bottom: 30px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
      position: relative;
      border-radius: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 50px;
    }

    .arrow {
      width: 80px;
      height: 50px;
      background: #D4AF37;
      clip-path: polygon(0 40%, 60% 40%, 60% 15%, 100% 50%, 60% 85%, 60% 60%, 0 60%);
      flex-shrink: 0;
    }

    .company-name {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 1px;
      margin: 0;
    }

    .company-name .white {
      color: #fff;
    }

    .company-name .gold {
      color: #D4AF37;
    }

    .company-sub {
      font-size: 13px;
      letter-spacing: 3px;
      color: #888;
      margin-top: 2px;
    }

    .person-name {
      font-size: 50px;
      color: #fff;
      font-weight: 700;
      margin: 0 0 20px 0;
      line-height: 1.1;
    }

    .person-title {
      font-size: 16px;
      letter-spacing: 2px;
      color: #D4AF37;
      font-weight: 600;
      margin: 0 0 30px 0;
    }

    .divider {
      height: 1px;
      background: #666;
      margin: 30px 0;
    }

    .contact-info {
      margin: 30px 0;
    }

    .contact-line {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
      font-size: 16px;
      color: #ddd;
      font-family: Arial, sans-serif;
      font-weight: 500;
    }

    .contact-dot {
      width: 10px;
      height: 10px;
      background: #D4AF37;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .contact-line a {
      color: #ddd;
      text-decoration: none;
    }

    .contact-line a:hover {
      color: #D4AF37;
    }

    .button-section {
      display: flex;
      gap: 15px;
      margin-top: 40px;
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .btn-save {
      background: #D4AF37;
      color: #000;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
      background: #FFD700;
    }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-whatsapp:hover {
      background: #20BA5A;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3);
    }

    .success-msg {
      display: none;
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid #10B981;
      color: #10B981;
      padding: 12px;
      border-radius: 6px;
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      animation: slideIn 0.3s ease;
    }

    .success-msg.show {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .business-card {
        padding: 30px;
      }

      .header {
        gap: 15px;
        margin-bottom: 30px;
      }

      .arrow {
        width: 60px;
        height: 40px;
      }

      .company-name {
        font-size: 32px;
      }

      .person-name {
        font-size: 36px;
      }

      .person-title {
        font-size: 14px;
      }

      .btn {
        padding: 12px 16px;
        font-size: 13px;
      }
    }

    @media print {
      .button-section,
      .success-msg {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">

          <div class="company-sub">VENTURE</div>
        </div>
      </div>

      <div class="person-name">Zayn Mohammad</div>
      <div class="person-title">SALES TEAM HEAD — SAUDI ARABIA</div>

      <div class="divider"></div>

      <div class="contact-info">
        <div class="contact-line">
          <div class="contact-dot"></div>
          <a href="tel:+966560224715">+966 56 022 4715</a>
        </div>
        <div class="contact-line">
          <div class="contact-dot"></div>
          <a href="mailto:sales@blackarrowksa.com">sales@blackarrowksa.com</a>
        </div>
        <div class="contact-line">
          <div class="contact-dot"></div>
          <a href="https://www.blackarrowksa.com" target="_blank">www.blackarrowksa.com</a>
        </div>
      </div>

      <div class="button-section">
        <button class="btn btn-save" onclick="saveContact()">💾 Save to Contacts</button>
        <a href="https://wa.me/966560224715" target="_blank" class="btn btn-whatsapp"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.004c-2.759 0-5.327 1.273-7.044 3.615-.422.521-.398 1.286.054 1.789l1.432 1.627c.363.414.972.547 1.513.335l.552-.269c.276-.134.577.04.653.324l.684 2.737c.09.36.432.63.804.63h2.302c.372 0 .715-.27.804-.63l.684-2.737c.076-.284.377-.458.653-.324l.552.269c.541.212 1.15.079 1.513-.335l1.432-1.627c.452-.503.476-1.268.054-1.789-1.717-2.342-4.285-3.615-7.044-3.615z"/></svg> WhatsApp</a>
      </div>

      <div class="success-msg" id="successMsg">✅ Contact saved successfully!</div>
    </div>
  </div>

  <script>
    function saveContact() {
      const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Zayn Mohammad
N:Mohammad;Zayn;;;
TITLE:Sales Team Head - Saudi Arabia
ORG:Black Arrow Venture
TEL;TYPE=WORK;TYPE=VOICE:+966560224715
EMAIL;TYPE=WORK:sales@blackarrowksa.com
URL;TYPE=WORK:https://www.blackarrowksa.com
END:VCARD`;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Zayn-Mohammad.vcf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
      } else {
        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Zayn-Mohammad.vcf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
      }

      const msg = document.getElementById('successMsg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
